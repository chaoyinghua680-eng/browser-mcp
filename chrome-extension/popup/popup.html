<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser MCP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f7f8fa;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header .badge {
      margin-left: auto;
      font-size: 11px;
      background: #16c784;
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
    }
    header .badge.disconnected { background: #e84040; }

    section { padding: 12px 16px; border-bottom: 1px solid #e8eaed; background: #fff; }
    section h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

    /* 已安装脚本列表（只读） */
    #script-list { display: flex; flex-direction: column; gap: 6px; }
    .script-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #f7f8fa;
      border-radius: 6px;
      border: 1px solid #e8eaed;
      gap: 8px;
    }
    .script-item.disabled { opacity: .55; }
    .script-item .info { flex: 1; min-width: 0; }
    .script-item .name { font-weight: 500; }
    .script-item .url { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #16c784;
      flex-shrink: 0;
    }
    .status-dot.off { background: #d1d5db; }
    #no-scripts { color: #aaa; font-size: 12px; padding: 4px 0; }

    /* 管理按钮 */
    .manage-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 14px 16px;
      padding: 9px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      width: calc(100% - 32px);
    }
    .manage-btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <header>
    <span>🔗</span>
    <h1>Browser MCP</h1>
    <span id="connection-badge" class="badge disconnected">未连接</span>
  </header>

  <section>
    <h2>已安装脚本</h2>
    <div id="script-list">
      <p id="no-scripts">暂无脚本</p>
    </div>
  </section>

  <button class="manage-btn" id="manage-btn">⚙️ 管理脚本</button>

  <script src="../dist/popup/popup.js" type="module"></script>
</body>
</html>
