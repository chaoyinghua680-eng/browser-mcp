<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser MCP 脚本管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f7f8fa;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header .badge {
      margin-left: auto;
      font-size: 12px;
      background: #16c784;
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
    }
    header .badge.disconnected { background: #e84040; }

    /* ── 主体容器 ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px; }

    /* ── 工具栏 ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .toolbar h2 { font-size: 15px; font-weight: 600; color: #333; }
    .btn-primary {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { background: #4f46e5; }

    /* ── 脚本列表 ── */
    #script-list { display: flex; flex-direction: column; gap: 10px; }
    #no-scripts {
      text-align: center;
      color: #aaa;
      padding: 48px 0;
      font-size: 14px;
    }

    .script-card {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow .15s;
    }
    .script-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .script-card.disabled { opacity: .55; }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .card-url {
      font-size: 12px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
    }

    .card-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-toggle {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #555;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-toggle:hover { background: #f3f4f6; }
    .btn-toggle.enabled { border-color: #6366f1; color: #6366f1; }

    .btn-edit {
      border: 1px solid #6366f1;
      background: #fff;
      color: #6366f1;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-edit:hover { background: #eef2ff; }

    .btn-delete {
      border: none;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-delete:hover { background: #fca5a5; }

    /* ── 编辑面板（弹层覆盖）── */
    #editor-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #editor-overlay.open { display: flex; }

    #editor-panel {
      background: #fff;
      border-radius: 10px;
      width: 680px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }

    #editor-panel h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #555;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: #6366f1; }
    .form-group textarea {
      height: 260px;
      resize: vertical;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .form-group input:disabled { background: #f3f4f6; color: #888; cursor: not-allowed; }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }
    .btn-cancel {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #555;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #f3f4f6; }
    .btn-save {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-save:hover { background: #4f46e5; }
    .btn-save:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* ── 状态提示 ── */
    #status-msg {
      font-size: 12px;
      min-height: 18px;
      margin-top: 10px;
      color: #16c784;
      text-align: right;
    }
    #status-msg.error { color: #dc2626; }
  </style>
</head>
<body>
  <header>
    <span>🔗</span>
    <h1>Browser MCP · 脚本管理</h1>
    <span id="connection-badge" class="badge disconnected">未连接</span>
  </header>

  <div class="container">
    <div class="toolbar">
      <h2>已安装脚本</h2>
      <button class="btn-primary" id="new-btn">+ 新建脚本</button>
    </div>

    <div id="script-list">
      <p id="no-scripts">暂无脚本，点击右上角「新建脚本」开始添加</p>
    </div>
  </div>

  <!-- 编辑/新建弹层 -->
  <div id="editor-overlay">
    <div id="editor-panel">
      <h3 id="editor-title">新建脚本</h3>

      <div class="form-group">
        <label for="input-name">工具名称（英文，对应 MCP Tool 名）</label>
        <input id="input-name" type="text" placeholder="例: get_taobao_orders" />
      </div>

      <div class="form-group">
        <label for="input-url">目标网址</label>
        <input id="input-url" type="url" placeholder="例: https://buyertrade.taobao.com/" />
      </div>

      <div class="form-group">
        <label for="input-code">脚本代码（JS）</label>
        <textarea id="input-code" placeholder="粘贴脚本代码..."></textarea>
      </div>

      <p id="status-msg"></p>

      <div class="editor-actions">
        <button class="btn-cancel" id="cancel-btn">取消</button>
        <button class="btn-save" id="save-btn">保存</button>
      </div>
    </div>
  </div>

  <script src="../dist/manager/manager.js" type="module"></script>
</body>
</html>
