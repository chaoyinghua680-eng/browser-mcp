<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser MCP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f7f8fa;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header .badge {
      margin-left: auto;
      font-size: 11px;
      background: #16c784;
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
    }
    header .badge.disconnected { background: #e84040; }

    section { padding: 12px 16px; border-bottom: 1px solid #e8eaed; background: #fff; }
    section h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

    /* 已安装脚本列表 */
    #script-list { display: flex; flex-direction: column; gap: 6px; }
    .script-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #f7f8fa;
      border-radius: 6px;
      border: 1px solid #e8eaed;
    }
    .script-item .name { flex: 1; font-weight: 500; }
    .script-item .url { font-size: 11px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .script-item button {
      border: none;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .script-item button:hover { background: #fca5a5; }
    #no-scripts { color: #aaa; font-size: 12px; padding: 4px 0; }

    /* 安装新脚本表单 */
    #install-form label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 3px;
      margin-top: 8px;
    }
    #install-form label:first-child { margin-top: 0; }
    #install-form input,
    #install-form textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    #install-form input:focus,
    #install-form textarea:focus { border-color: #6366f1; }
    #install-form textarea { height: 80px; resize: vertical; font-family: "SF Mono", monospace; }

    #install-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    #install-btn:hover { background: #4f46e5; }
    #install-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #status-msg {
      margin-top: 8px;
      font-size: 12px;
      min-height: 16px;
      color: #16c784;
    }
    #status-msg.error { color: #dc2626; }
  </style>
</head>
<body>
  <header>
    <span>🔗</span>
    <h1>Browser MCP</h1>
    <span id="connection-badge" class="badge disconnected">未连接</span>
  </header>

  <section>
    <h2>已安装脚本</h2>
    <div id="script-list">
      <p id="no-scripts">暂无脚本，请在下方安装</p>
    </div>
  </section>

  <section>
    <h2>安装新脚本</h2>
    <div id="install-form">
      <label for="script-name">工具名称（英文，对应 MCP Tool 名）</label>
      <input id="script-name" type="text" placeholder="例: get_taobao_orders" />

      <label for="target-url">目标网址</label>
      <input id="target-url" type="url" placeholder="例: https://buyertrade.taobao.com/" />

      <label for="script-code">脚本代码（JS）</label>
      <textarea id="script-code" placeholder="粘贴脚本代码..."></textarea>

      <button id="install-btn">安装脚本</button>
      <p id="status-msg"></p>
    </div>
  </section>

  <script src="../dist/popup/popup.js" type="module"></script>
</body>
</html>
